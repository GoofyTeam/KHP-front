type Category {
  """Unique primary key."""
  id: ID!

  """Category name."""
  name: String!

  """When the Category was created."""
  created_at: DateTime!

  """When the Category was last updated."""
  updated_at: DateTime!
}

"""A paginated list of Category items."""
type CategoryPaginator {
  """Pagination information about the list of items."""
  paginatorInfo: PaginatorInfo!

  """A list of Category items."""
  data: [Category!]!
}

type Company {
  """Unique primary key."""
  id: ID!

  """Company name."""
  name: String!

  """Preparations associated with this company."""
  preparations: [Preparation!]!
  categories: [Category!]!
  locations: [Location!]!

  """When the company was created."""
  created_at: DateTime!

  """When the company was last updated."""
  updated_at: DateTime!
}

"""A paginated list of Company items."""
type CompanyPaginator {
  """Pagination information about the list of items."""
  paginatorInfo: PaginatorInfo!

  """A list of Company items."""
  data: [Company!]!
}

"""
A datetime string with format `Y-m-d H:i:s`, e.g. `2018-05-23 13:43:32`.
"""
scalar DateTime

type Ingredient {
  """Unique primary key."""
  id: ID!

  """Ingredient name."""
  name: String!

  """Unit of measurement for the ingredient."""
  unit: String!
  quantities: [IngredientQuantity!]!

  """The company that owns this ingredient."""
  company: Company!
  categories: [Category!]!
  image_url: String

  """When the ingredient was created."""
  created_at: DateTime!

  """When the ingredient was last updated."""
  updated_at: DateTime!
}

"""A paginated list of Ingredient items."""
type IngredientPaginator {
  """Pagination information about the list of items."""
  paginatorInfo: PaginatorInfo!

  """A list of Ingredient items."""
  data: [Ingredient!]!
}

type IngredientQuantity {
  """Le stock de l’ingrédient."""
  quantity: Float!

  """La localisation de ce stock."""
  location: Location!
}

type Location {
  """Unique primary key."""
  id: ID!

  """Location name."""
  name: String!

  """Location company."""
  company: Company!

  """When the location was created."""
  created_at: DateTime!

  """When the location was last updated."""
  updated_at: DateTime!

  """Ingredients stored in this location."""
  ingredients: [Ingredient!]!
}

"""A paginated list of Location items."""
type LocationPaginator {
  """Pagination information about the list of items."""
  paginatorInfo: PaginatorInfo!

  """A list of Location items."""
  data: [Location!]!
}

"""Allows ordering a list of records."""
input OrderByClause {
  """The column that is used for ordering."""
  column: String!

  """The direction that is used for ordering."""
  order: SortOrder!
}

"""
Aggregate functions when ordering by a relation without specifying a column.
"""
enum OrderByRelationAggregateFunction {
  """Amount of items."""
  COUNT
}

"""
Aggregate functions when ordering by a relation that may specify a column.
"""
enum OrderByRelationWithColumnAggregateFunction {
  """Average."""
  AVG

  """Minimum."""
  MIN

  """Maximum."""
  MAX

  """Sum."""
  SUM

  """Amount of items."""
  COUNT
}

"""Information about pagination using a fully featured paginator."""
type PaginatorInfo {
  """Number of items in the current page."""
  count: Int!

  """Index of the current page."""
  currentPage: Int!

  """Index of the first item in the current page."""
  firstItem: Int

  """Are there more pages after this one?"""
  hasMorePages: Boolean!

  """Index of the last item in the current page."""
  lastItem: Int

  """Index of the last available page."""
  lastPage: Int!

  """Number of items per page."""
  perPage: Int!

  """Number of total available items."""
  total: Int!
}

type Preparation {
  """Unique primary key."""
  id: ID!

  """Preparation name."""
  name: String!

  """Unit of measurement for the preparation."""
  unit: String!

  """Type of preparation (e.g., chemical, biological, physical)."""
  type: PreparationTypeEnum!

  """The company that produces this preparation."""
  company: Company!

  """When the preparation was created."""
  created_at: DateTime!

  """When the preparation was last updated."""
  updated_at: DateTime!
}

"""A paginated list of Preparation items."""
type PreparationPaginator {
  """Pagination information about the list of items."""
  paginatorInfo: PaginatorInfo!

  """A list of Preparation items."""
  data: [Preparation!]!
}

enum PreparationTypeEnum {
  SIMPLE
  COMPOSITE
}

type Query {
  """Find a single Category (only if it belongs to the current company)."""
  Category(
    """Search by primary key."""
    id: ID

    """Search by Category name."""
    name: String
  ): Category

  """Find a single company by an identifying attribute."""
  company(
    """Search by primary key."""
    id: ID

    """Search by company name."""
    name: String
  ): Company

  """Find a single ingredient (only if it belongs to the current company)."""
  ingredient(
    """Search by primary key."""
    id: ID

    """Search by ingredient name."""
    name: String
  ): Ingredient

  """Find a single location (only if it belongs to the current company)."""
  location(
    """Search by primary key."""
    id: ID

    """Search by location name."""
    name: String
  ): Location

  """Trouve une preparation (et seulement si elle appartient à ma company)"""
  preparation(id: ID, name: String): Preparation

  """Find a single user by an identifying attribute."""
  user(
    """Search by primary key."""
    id: ID

    """Search by email address."""
    email: String
  ): User

  """List categories for the current company."""
  categories(
    """Limits number of fetched items."""
    first: Int! = 10

    """The offset from which items are returned."""
    page: Int
  ): CategoryPaginator!

  """List multiple companies."""
  companies(
    """Filters by name. Accepts SQL LIKE wildcards `%` and `_`."""
    name: String

    """Limits number of fetched items."""
    first: Int! = 10

    """The offset from which items are returned."""
    page: Int
  ): CompanyPaginator!

  """List ingredients for the current company."""
  ingredients(
    """Filter by ingredient name. Accepts SQL LIKE wildcards `%` and `_`."""
    name: String

    """Filter by unit of measurement. Accepts SQL LIKE wildcards `%` and `_`."""
    unit: String
    locationId: ID
    locationName: String

    """Limits number of fetched items."""
    first: Int! = 10

    """The offset from which items are returned."""
    page: Int
  ): IngredientPaginator!

  """List locations for the current company."""
  locations(
    """Filter by location name. Accepts SQL LIKE wildcards `%` and `_`."""
    name: String

    """Limits number of fetched items."""
    first: Int! = 10

    """The offset from which items are returned."""
    page: Int
  ): LocationPaginator!

  """Liste les preparations de ma company uniquement"""
  preparations(
    name: String
    type: String
    unit: String

    """Limits number of fetched items."""
    first: Int! = 10

    """The offset from which items are returned."""
    page: Int
  ): PreparationPaginator!

  """List multiple users."""
  users(
    """Filters by name. Accepts SQL LIKE wildcards `%` and `_`."""
    name: String

    """Limits number of fetched items."""
    first: Int! = 10

    """The offset from which items are returned."""
    page: Int
  ): UserPaginator!
}

"""Directions for ordering a list of records."""
enum SortOrder {
  """Sort records in ascending order."""
  ASC

  """Sort records in descending order."""
  DESC
}

"""
Specify if you want to include or exclude trashed results from a query.
"""
enum Trashed {
  """Only return trashed results."""
  ONLY

  """Return both trashed and non-trashed results."""
  WITH

  """Only return non-trashed results."""
  WITHOUT
}

"""Account of a person who uses this application."""
type User {
  """Unique primary key."""
  id: ID!

  """The company this user belongs to."""
  company: Company

  """Non-unique name."""
  name: String!

  """Unique email address."""
  email: String!

  """When the email was verified."""
  email_verified_at: DateTime

  """When the account was created."""
  created_at: DateTime!

  """When the account was last updated."""
  updated_at: DateTime!
}

"""A paginated list of User items."""
type UserPaginator {
  """Pagination information about the list of items."""
  paginatorInfo: PaginatorInfo!

  """A list of User items."""
  data: [User!]!
}

